name: Build

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  package:
    name: Package ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: NovelScript-Studio-windows
            command: npm run package:win:dir
            path: release/win-unpacked
          - os: macos-latest
            artifact: NovelScript-Studio-macos
            command: npm run package:mac:dir
            path: release/mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package app
        run: ${{ matrix.command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
